            document.getElementById('distance-display').innerText = '0m';
            document.getElementById('rescued-card').style.display = 'none';
            document.getElementById('btn-rescue').innerText = "시민구출: 0 / 3";
            
            // 배경 생성 (패럴랙스 레이어: 뒷배경, 앞배경, 지면)
            this.stageIndex = 0;
            this.currentStageConfig = GAME_CONFIG.stages[this.stageIndex];
            
            // 뒷배경 (Distant Sky - Y: 120, H: 240)
            this.skyBg = this.add.tileSprite(400, 120, 800, 240, null).setScrollFactor(0);
            
            // 앞배경/중간배경 (Midground - Y: 130, H: 260) - 도로 위 공간을 다채롭게 표현
            this.midBg = this.add.tileSprite(400, 130, 800, 260, null).setScrollFactor(0);
            this.midBg.setDepth(1);
            
            // 바닥 지형 (바닥 - Y: 320, H: 160) - 화면 하단 5%~40% 영역(Y: 240~380)을 덮는 도로
            this.groundY = 310;
            this.ground = this.add.tileSprite(400, 320, 800, 160, null);
            this.ground.setDepth(2);

            this.updateBackgroundTexture();
            this.updateGroundTexture();

            // 물리 시스템 설정
            this.physics.world.setBounds(0, 0, 800, 400);
            this.physics.world.drawDebug = window.gameData.showHitboxes;

            // 플레이어 인스턴스 (정가운데 스폰: X는 화면의 중심 400, Y는 240~380의 중간인 310)
            this.player = new Player(this, 400, 310);
            
            // 좀비 그룹 및 풀링
            this.zombieGroup = this.physics.add.group({
                classType: Zombie,
                maxSize: 20, // 동시 연산 렉 방지를 위해 화면 최대 20마리 제한
                runChildUpdate: true
            });

            // 좀비 스폰 타이머 설정
            this.spawnTimer = this.time.addEvent({
                delay: this.currentStageConfig.zombieRate,
                callback: this.spawnZombieHazard,
                callbackScope: this,
                loop: true
            });

            // 아이템 그룹
            this.items = this.physics.add.group();
            this.spitProjectiles = this.physics.add.group();
            this.itemSpawnTimer = this.time.addEvent({
                delay: 10000, // 10초마다 알약/상자 스폰
                callback: this.spawnItemBox,
                callbackScope: this,
                loop: true
            });

            // 일정 시간마다 자연스럽게 합류하는 좀비 추가 (기본 점수 어그로용)
            this.naturalHordeTimer = this.time.addEvent({
                delay: 12000, // 12초마다 자연스럽게 군단에 합류하는 좀비 1마리 스폰
                callback: () => {
                    this.addZombiesToHorde(1);
                },
                callbackScope: this,
                loop: true
            });

            // 등 뒤에 쫓아오는 무리(Grouping) 관리용 물리 그룹 및 목록
            this.hordeGroup = this.physics.add.group();
            this.hordeZombies = [];

            // 무기 배치 및 히트박스 생성용 키보드 매핑
            this.cursors = this.input.keyboard.createCursorKeys();
            this.wasd = this.input.keyboard.addKeys({
                up: Phaser.Input.Keyboard.KeyCodes.W,
                down: Phaser.Input.Keyboard.KeyCodes.S,
                left: Phaser.Input.Keyboard.KeyCodes.A,
                right: Phaser.Input.Keyboard.KeyCodes.D
            });
            this.attackKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
            this.debugKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.D);

            // 충돌/오버랩 처리
            this.physics.add.overlap(this.player, this.zombieGroup, this.handlePlayerDamage, null, this);
            this.physics.add.overlap(this.player, this.items, this.handleItemCollect, null, this);
            this.physics.add.overlap(this.player, this.spitProjectiles, this.handleSpitDamage, null, this);

            // BGM 재생 연동 확인
            if (window.gameData.bgmSelected && window.bgmPlayer.paused) {
                window.bgmPlayer.play();
            }

            // 모바일용 양분 스크린 터치 연동
            this.input.on('pointerdown', (pointer) => {
                if (pointer.x < 400) {
                    // 왼쪽 화면 클릭 시 모바일용 버추얼 타겟 지정 이동
                    this.player.setMobileMoveTarget(pointer.x, pointer.y);
                } else {
                    // 오른쪽 화면 클릭 시 공격
                    this.player.swingBat();
                }
            });

            // 모바일 터치 드래그 추적
            this.input.on('pointermove', (pointer) => {
                if (pointer.isDown && pointer.x < 400) {
                    this.player.setMobileMoveTarget(pointer.x, pointer.y);
                }
            });

            // 첫 연구원 소환 예약 (1분 +- 10초)
            this.shouldSpawnResearcherNext = false;
            this.time.delayedCall(Phaser.Math.Between(50000, 70000), () => {
                this.shouldSpawnResearcherNext = true;
            }, [], this);

            // 스테이지 진입 텍스트 안내
            this.showStageBanner(this.currentStageConfig.name);
            
            showSubtitle("인간성 게이지가 떨어지지 않도록 알약을 먹고 달려야 합니다.", 3500);
        }

        update(time, delta) {
            // 디버그 키 토글 (`D`)
            if (Phaser.Input.Keyboard.JustDown(this.debugKey)) {
                const panel = document.getElementById('debug-panel');
                panel.style.display = (panel.style.display === 'none') ? 'flex' : 'none';
            }

            const modifiedDelta = delta * window.gameData.timeScale;

            // 시간 업데이트 (음악 파일 유무에 따라 싱크)
            if (window.gameData.bgmSelected && window.bgmPlayer.src) {
                window.gameData.elapsedTime = window.bgmPlayer.currentTime;
            } else {
                window.gameData.elapsedTime += (modifiedDelta / 1000);
            }

            // 디버그 슬라이더 값 동기화
            document.getElementById('humanity-slider').value = window.gameData.currentHumanity;
            document.getElementById('humanity-slider-val').innerText = Math.round(window.gameData.currentHumanity);

            // HUD 렌더링 갱신
            this.updateHud();

            // 플레이어 기동
            this.player.update(modifiedDelta);

            // 무리(Horde) 포메이션 업데이트
            this.updateHordeFormation(modifiedDelta);

            // 아이템(상자/알약)의 좌향/우향 흐름 및 화면 밖 삭제
            this.items.getChildren().forEach(item => {
                if (item.active) {
                    item.body.setVelocity(60 * window.gameData.timeScale, 0);
                    if (item.x > 840) {
                        item.destroy(); // 화면 우측 밖으로 완전히 나가면 삭제
                    }
                }
            });

            // 침 투사체 화면 밖 소멸 및 자체 업데이트
            this.spitProjectiles.getChildren().forEach(spit => {
                if (spit.active) {
                    if (spit.x > 840 || spit.x < -40 || spit.y > 440 || spit.y < -40) {
                        spit.destroy();
                    }
                }
            });

            // 패럴랙스 배경 및 바닥 스크롤 (앞배경/뒷배경/지면 각자 다른 속도로 우측 스크롤)
            const speedMultiplier = this.currentStageConfig.scrollSpeed * window.gameData.timeScale;
            this.skyBg.tilePositionX -= (0.2 * speedMultiplier); // 뒷배경 매우 느림
            this.midBg.tilePositionX -= (1.2 * speedMultiplier); // 앞배경 중간 속도
            this.ground.tilePositionX -= (2.5 * speedMultiplier); // 바닥 가장 빠름

            // 누적 거리 환산
            window.gameData.distanceWalked += (0.05 * speedMultiplier);

            // 스테이지 타임라인 기획 모니터링
            this.checkTimelineStageTransitions();

            // 엔딩 돌입 트리거 검출 (4분 30초 완료)
            if (window.gameData.elapsedTime >= GAME_CONFIG.epilogueTime) {
                this.triggerEpilogueSequence();
            }
        }

        updateHud() {
            const min = Math.floor(window.gameData.elapsedTime / 60);
            const sec = Math.floor(window.gameData.elapsedTime % 60);
            const padSec = String(sec).padStart(2, '0');
            
            const totalMin = Math.floor(GAME_CONFIG.endingTime / 60);
            const totalSec = Math.floor(GAME_CONFIG.endingTime % 60);
            const padTotalSec = String(totalSec).padStart(2, '0');

            document.getElementById('time-display').innerText = `${min}:${padSec} / ${totalMin}:${padTotalSec}`;
            document.getElementById('distance-display').innerText = `${Math.floor(window.gameData.distanceWalked)}m`;
            
            // 인간성 바 게이지 반영
            const humPct = Math.max(0, Math.min(100, window.gameData.currentHumanity));
            document.getElementById('humanity-text').innerText = `${Math.round(humPct)}%`;
            document.getElementById('humanity-bar-inner').style.width = `${humPct}%`;

            // 인간성 상태에 따른 바 네온 컬러 퓨징
            const innerBar = document.getElementById('humanity-bar-inner');
            if (humPct > 50) {
                innerBar.style.background = 'linear-gradient(90deg, var(--neon-cyan) 0%, #0077ff 100%)';
                innerBar.style.boxShadow = '0 0 8px var(--neon-cyan)';
            } else if (humPct > 25) {
                innerBar.style.background = 'linear-gradient(90deg, #ffaa00 0%, #cc7700 100%)';
                innerBar.style.boxShadow = '0 0 8px #ffaa00';
            } else {
                innerBar.style.background = 'linear-gradient(90deg, #ff0055 0%, #990022 100%)';
                innerBar.style.boxShadow = '0 0 8px #ff0055';
            }

            // 초상화 및 인간성 상태 갱신
            const portraitBox = document.getElementById('portrait-box');
            const portraitStatus = document.getElementById('portrait-status');
            if (portraitBox && portraitStatus) {
                if (humPct > 50) {
                    portraitBox.style.backgroundColor = 'var(--neon-cyan)';
                    portraitBox.style.boxShadow = '0 0 8px var(--neon-cyan)';
                    portraitStatus.innerText = 'HUMAN';
                    portraitStatus.style.color = 'var(--neon-cyan)';
                } else if (humPct > 25) {
                    portraitBox.style.backgroundColor = '#5cc8a6'; // 민트색 (감염진행)
                    portraitBox.style.boxShadow = '0 0 8px #5cc8a6';
                    portraitStatus.innerText = 'INFECTING';
                    portraitStatus.style.color = '#5cc8a6';
                } else if (humPct > 0) {
                    portraitBox.style.backgroundColor = '#2c7a5f'; // 탁한 녹색 (감염완료)
                    portraitBox.style.boxShadow = '0 0 8px #2c7a5f';
                    portraitStatus.innerText = 'INFECTED';
                    portraitStatus.style.color = '#ff3f3f';
                } else {
                    portraitBox.style.backgroundColor = '#2ebd59'; // 좀비
                    portraitBox.style.boxShadow = '0 0 8px #2ebd59';
                    portraitStatus.innerText = 'ZOMBIE';
                    portraitStatus.style.color = '#2ebd59';
                }
            }
        }

        // ==========================================
        // 5. 본 게임 메커니즘 함수들
        // ==========================================
        

            // 좀비 스폰 매커니즘 (플레이어 전방 좌측 화면 밖 / 또는 우측 경고 돌진)
            spawnZombieHazard() {
                if (this.zombieGroup.getTotalUsed() >= 20) return; // 오브젝트 풀 한계치 작동
                
                const rand = Math.random();
                const yPos = Phaser.Math.Between(240, 370);

                if (rand < 0.25 && window.gameData.elapsedTime > 20) {
                    // RUNNER 좀비 (경보 알림 후 돌격)
                    this.spawnRunnerZombie(yPos);
                } else if (rand < 0.45 && window.gameData.elapsedTime > 30) {
                    // SPITTER 좀비 (제자리에 서서 침 뱉는 원거리 좀비)
                    let z = this.zombieGroup.get(-40, yPos, 'zombie_spitter');
                    if (z) {
                        z.activate('SPITTER', 1);
                    }
                } else {
                    // NORMAL 좀비 (좌측에서 스폰되어 오른쪽 플레이어를 향해 우향 역추격)
                    let z = this.zombieGroup.get(-40, yPos, 'zombie_normal');
                    if (z) {
                        // 15% 확률로 체력이 2~3인 엘리트 좀비로 등장
                        const hp = (Math.random() < 0.15) ? Phaser.Math.Between(2, 3) : 1;
                        z.activate('NORMAL', hp);
                    }
                }

                // 스테이지 속도에 맞춰 주기 갱신
                this.spawnTimer.delay = this.currentStageConfig.zombieRate / window.gameData.timeScale;
            }

            spawnRunnerZombie(yPos) {
                // 러너좀비는 왼쪽/오른쪽 랜덤 스폰 (경고창 위치 및 스폰 좌표 동기화)
                const isLeft = Math.random() < 0.5;
                const warnX = isLeft ? 40 : 760;
                const spawnX = isLeft ? -40 : 840;

                const warnIcon = this.add.text(warnX, yPos, '!', {
                    fontFamily: 'Press Start 2P',
                    fontSize: '24px',
                    fill: '#ff0055',
                    stroke: '#ffffff',
                    strokeThickness: 3
                }).setOrigin(0.5);

                this.tweens.add({
                    targets: warnIcon,
                    alpha: 0.1,
                    duration: 250 / window.gameData.timeScale,
                    yoyo: true,
                    repeat: 5,
                    onComplete: () => {
                        warnIcon.destroy();
                        let z = this.zombieGroup.get(spawnX, yPos, 'zombie_runner');
                        if (z) {
                            z.runnerDirection = isLeft ? 1 : -1;
                            z.activate('RUNNER', 1);
                        }
                    }
                });
            }

            spawnItemBox() {
                // 상자랑 알약도 좀비처럼 왼쪽 끝에서 등장
                const x = -40;
                const y = Phaser.Math.Between(240, 370);
                const speed = 60; // 초당 60픽셀 속도로 우향 이동
                
                // 보급 상자 스폰
                const box = this.items.create(x, y, 'box');
                box.setDepth(5);
                box.body.setSize(40, 40);
                box.isBox = true;
                box.hp = 2; // 방망이 2타 격파 조건
                box.body.setVelocity(speed * window.gameData.timeScale, 0);

                // 이번 상자에 연구원이 들어있는지 판정
                if (this.shouldSpawnResearcherNext) {
                    box.containsResearcher = true;
                    this.shouldSpawnResearcherNext = false;
                    // 다음 연구원 리젠 예약 (1분 +- 10초)
                    this.time.delayedCall(Phaser.Math.Between(50000, 70000), () => {
                        this.shouldSpawnResearcherNext = true;
                    }, [], this);
                } else {
                    box.containsResearcher = false;
                }

                // 상자 주위에 2~3마리의 좀비 생성하여 세트 배치
                const numZombies = Phaser.Math.Between(2, 3);
                for (let i = 0; i < numZombies; i++) {
                    const offsetSlotX = -30 - i * 20;
                    const offsetSlotY = Phaser.Math.Between(-20, 20);
                    
                    // 첫 번째 좀비는 항상 STALKER 좀비로 생성하여 처치 시 연구원 구출 가능하게 처리
                    const zType = (i === 0) ? 'STALKER' : 'NORMAL';
                    const texture = (zType === 'STALKER') ? 'zombie_stalker' : 'zombie_normal';
                    
                    let z = this.zombieGroup.get(x + offsetSlotX, y + offsetSlotY, texture);
                    if (z) {
                        z.runnerDirection = -1; // 기본 방향
                        z.activate(zType, 1);
                        z.targetBox = box;
                        z.boxOffsetY = offsetSlotY;
                    }
                }
            }

            // 방망이 히트박스를 이용한 좀비 타격 판정
            hitZombiesWithBat(hitbox) {
                // 활성 좀비들 판정
                this.zombieGroup.getChildren().forEach(zombie => {
                    if (zombie.active && zombie.currentState === 'CHASING' && Phaser.Geom.Intersects.RectangleToRectangle(hitbox, zombie.getBounds())) {
                        zombie.takeDamage();
                    }
                });

                // 침 투사체 파괴 판정
                this.spitProjectiles.getChildren().forEach(spit => {
                    if (spit.active && Phaser.Geom.Intersects.RectangleToRectangle(hitbox, spit.getBounds())) {
                        spit.destroy();
                        this.woodParticleBurst(spit.x, spit.y); // 산산조각 효과 공유
                    }
                });

                // 상자 파괴 판정
                this.items.getChildren().forEach(item => {
                    if (item.active && item.isBox && Phaser.Geom.Intersects.RectangleToRectangle(hitbox, item.getBounds())) {
                        item.hp--;
                        // 파편 튐 효과
                        this.woodParticleBurst(item.x, item.y);
                        if (item.hp <= 0) {
                            this.breakBox(item);
                        }
                    }
                });
            }

            breakBox(box) {
                box.destroy();
                
                if (box.containsResearcher) {
                    showSubtitle("보급 상자 격파! 연구원 발견!", 1500);
                    this.rescueScientist(box.x, box.y);
                } else {
                    // 일반 상자 드롭 확률 분기 (좀비 20%, 알약 30%, 시민 50%)
                    const roll = Math.random();
                    if (roll < 0.2) {
                        showSubtitle("보급 상자 격파! 숨어있던 좀비 급습!", 1500);
                        // 좀비가 튀어나와 즉시 추종
                        let z = this.zombieGroup.get(box.x, box.y, 'zombie_normal');
                        if (z) {
                            z.activate('NORMAL', 1);
                        }
                    } else if (roll < 0.5) {
                        showSubtitle("보급 상자 격파! 알약 출현!", 1500);
                        // 알약 생성
                        const pill = this.items.create(box.x, box.y, 'pill');
                        pill.setDepth(5);
                        pill.body.setSize(16, 16);
                        pill.isPill = true;
                        pill.body.setVelocity(60 * window.gameData.timeScale, 0);
                    } else {
                        // 시민 50% 분기 (심통봇 1%, 스네이크 1%, 일반시민 98%)
                        const citizenRoll = Math.random();
                        let citizenType = 'citizen_normal';
                        let name = '일반시민';
                        
                        if (citizenRoll < 0.01) {
                            citizenType = 'citizen_simtongbot';
                            name = '심통봇';
                        } else if (citizenRoll < 0.02) {
                            citizenType = 'citizen_snake';
                            name = '스네이크';
                        }
                        
                        showSubtitle(`보급 상자 격파! ${name} 구조 성공!`, 1500);
                        this.rescueCitizen(box.x, box.y, citizenType, name);
                    }
                }
            }

            rescueScientist(spawnX, spawnY) {
                // 연구원 NPC 스폰
                const npc = this.physics.add.sprite(spawnX, spawnY, 'scientist');
                npc.setDepth(4);
                
                // 구조 느낌표 (!) 생성
                const icon = this.add.text(spawnX, spawnY - 30, '!', {
                    fontFamily: 'Orbitron',
                    fontSize: '18px',
                    fill: '#00d2fc',
                    stroke: '#000000',
                    strokeThickness: 2
                }).setOrigin(0.5);

                // 구출 횟수 증가 및 진엔딩 판정용 플래그 갱신
                window.gameData.rescuedScientists = (window.gameData.rescuedScientists || 0) + 1;
                window.gameData.isScientistRescued = (window.gameData.rescuedScientists >= 3);

                // HUD 카드 오버레이 갱신
                const card = document.getElementById('rescued-card');
                const status = document.getElementById('rescued-status');
                card.style.display = 'flex';
                status.innerText = `${window.gameData.rescuedScientists} / 3`;
                status.style.color = 'var(--neon-cyan)';
                
                document.getElementById('btn-rescue').innerText = `시민구출: ${window.gameData.rescuedScientists} / 3`;

                showSubtitle(`연구원 구출 성공! 현재 (${window.gameData.rescuedScientists} / 3)`, 3000);

                // 우측 방향으로 탈출해 밀려나는 연출
                this.tweens.add({
                    targets: [npc, icon],
                    x: '+=300',
                    alpha: 0,
                    duration: 2500 / window.gameData.timeScale,
                    onComplete: () => {
                        npc.destroy();
                        icon.destroy();
                    }
                });
            }

            rescueCitizen(spawnX, spawnY, texture, name) {
                // 시민 NPC 스폰
                const npc = this.physics.add.sprite(spawnX, spawnY, texture);
                npc.setDepth(4);
                
                // 캐릭터에 따른 개별 아이콘 연출
                const iconText = (name === '심통봇' || name === '스네이크') ? '★' : '♥';
                const iconColor = (name === '심통봇') ? '#9b59b6' : (name === '스네이크' ? '#2ecc71' : '#ff3366');
                
                const icon = this.add.text(spawnX, spawnY - 30, iconText, {
                    fontFamily: 'Orbitron',
                    fontSize: '18px',
                    fill: iconColor,
                    stroke: '#000000',
                    strokeThickness: 2
                }).setOrigin(0.5);

                // 우측 방향으로 탈출해 밀려나는 연출
                this.tweens.add({
                    targets: [npc, icon],
                    x: '+=300',
                    alpha: 0,
                    duration: 2500 / window.gameData.timeScale,
                    onComplete: () => {
                        npc.destroy();
                        icon.destroy();
                    }
                });
            }

            woodParticleBurst(x, y) {
                const emitter = this.add.particles(x, y, 'particle_wood', {
                    speed: { min: -100, max: 100 },
                    angle: { min: 0, max: 360 },
                    scale: { start: 1, end: 0 },
                    blendMode: 'NORMAL',
                    lifespan: 600,
                    gravityY: 300,
                    maxParticles: 8
                });
                emitter.setDepth(10);
            }

            // 좀비 격파 후 군단에 추가
            addZombiesToHorde(count, isElite = false) {
                for (let i = 0; i < count; i++) {
                    const rx = Phaser.Math.Between(580, 780);
                    const ry = Phaser.Math.Between(240, 360);
                    // 아예 화면 우측 밖(850)에서 스폰하여, 무리 대형으로 쑤욱 기어들어가게 연출
                    const hz = this.physics.add.sprite(850, ry, 'zombie_normal');
                    hz.setDepth(3);
                    hz.isElite = isElite;
                    
                    if (isElite) {
                        hz.setTint(0xff5555); // 엘리트 좀비 모양(붉은 틴트) 유지
                        hz.setScale(1.25);    // 엘리트 좀비 크기 유지
                    } else {
                        hz.setTint(0xffffff);
                        hz.setScale(1.0);
                    }

                    // 개별 노이즈/랜덤 움직임 값 부여
                    hz.xNoiseSeed = Math.random() * 1000;
                    hz.yNoiseSeed = Math.random() * 1000;
                    hz.xOffset = Phaser.Math.Between(-30, 30); // 줄 세우기에서 개별 좌우 편차
                    hz.yOffset = Phaser.Math.Between(-25, 25); // 줄 세우기에서 개별 상하 편차
                    hz.speedFrequency = 0.001 + Math.random() * 0.002; // 속도 요동치는 주기성
                    hz.moveFrequency = 0.0015 + Math.random() * 0.002;  // 위치 이동 흔들림 주기성
                    
                    // 스케일 오르내림 등으로 흔들리는 효과
                    this.physics.add.overlap(this.player, hz, () => {}, null, this);
                    this.hordeZombies.push(hz);
                }
                
                // 전역 데이터 및 HUD 동기화!
                window.gameData.totalEscortedCount = this.hordeZombies.length;
                window.gameData.eliteHordeCount = this.hordeZombies.filter(z => z.isElite).length;
                window.gameData.maxZombieCombo = Math.max(window.gameData.maxZombieCombo, window.gameData.totalEscortedCount);
                document.getElementById('combo-display').innerText = window.gameData.totalEscortedCount;
                document.getElementById('escort-display').innerText = window.gameData.totalEscortedCount;
            }

            updateHordeFormation(delta) {
                const time = this.time.now;
                // 무리의 뒤따름 흔들림 포메이션 구현 (오른쪽에 자연스럽게 뭉치며 유기적으로 요동치게 변경)
                this.hordeZombies.forEach((hz, idx) => {
                    if (hz.xNoiseSeed === undefined) {
                        hz.xNoiseSeed = Math.random() * 1000;
                        hz.yNoiseSeed = Math.random() * 1000;
                        hz.xOffset = Phaser.Math.Between(-30, 30);
                        hz.yOffset = Phaser.Math.Between(-25, 25);
                        hz.speedFrequency = 0.002;
                        hz.moveFrequency = 0.002;
                    }

                    // 시간과 주파수를 활용한 고유 상하좌우 요동 노이즈
                    const randomXMovement = Math.sin(time * hz.moveFrequency + hz.xNoiseSeed) * 22;
                    const randomYMovement = Math.cos(time * hz.moveFrequency + hz.yNoiseSeed) * 16;

                    // 타겟 바인딩 포지션 (기본 대형 배치 + 개별 영구 오프셋 + 실시간 흔들림 노이즈)
                    const col = idx % 4;
                    const row = Math.floor(idx / 4);
                    
                    const targetX = 640 + col * 32 + hz.xOffset + randomXMovement;
                    const targetY = 250 + row * 18 + hz.yOffset + randomYMovement; // 벨트스크롤 바닥 Y축 매칭 조정

                    // 속도가 주기적으로 부드럽게 변하도록 코사인 파동 적용 (0.02 ~ 0.08)
                    const speedFluctuation = 0.05 + Math.cos(time * hz.speedFrequency + hz.xNoiseSeed) * 0.03;
                    const lerpSpeed = speedFluctuation * window.gameData.timeScale;

                    // 부드러운 선형 보간 이동 (LERP)
                    hz.x = Phaser.Math.Linear(hz.x, targetX, lerpSpeed);
                    hz.y = Phaser.Math.Linear(hz.y, Math.min(this.groundY, targetY), lerpSpeed);
                });
            }

            // ==========================================
            // 6. 충돌 및 이벤트 가위바위보 판정
            // ==========================================
            handlePlayerDamage(player, zombie) {
                // 마지막 스테이지(공사장, 180초 이상)에서는 좀비 상태이며 무적이므로 충돌 피해 없음
                if (window.gameData.elapsedTime >= 180) return;

                if (!zombie.active || zombie.currentState !== 'CHASING' || zombie.passedPlayer || player.isInvincible) return;

                // 돌진 좀비 대시 회피 유도 등
                window.gameData.currentHumanity -= GAME_CONFIG.humanityLossOnHit;
                
                // 데미지 사운드 폴백 비프음
                this.playPulseSound(120, 0.15);

                // 무적 점멸 가동
                player.triggerInvincibility();

                // 좀비에 맞으면 콤보가 리셋되지 않고 좀비 무리에서 3마리씩 감염 도망쳐 삭제 (어그로 감소 패널티)
                const penalty = Math.min(3, this.hordeZombies.length);
                for(let i=0; i<penalty; i++) {
                    let hz = this.hordeZombies.pop();
                    if (hz) hz.destroy();
                }
                window.gameData.totalEscortedCount = this.hordeZombies.length;
                window.gameData.eliteHordeCount = this.hordeZombies.filter(z => z.isElite).length;
                document.getElementById('combo-display').innerText = window.gameData.totalEscortedCount;
                document.getElementById('escort-display').innerText = window.gameData.totalEscortedCount;
                
                // 피격 바운스백
                player.x += 35; // 우측(뒤쪽)으로 밀림
                
                showSubtitle(`좀비 습격 피격! 인간성 감소! 군단 어그로 이탈.`, 1500);

                // 0 도달 시 감염 데드엔딩 (Player FSM에서도 체크하지만 이중 보장)
                if (window.gameData.currentHumanity <= 0) {
                    this.triggerGameOverInfection();
                }
            }

            handleSpitDamage(player, spit) {
                spit.destroy();
                if (window.gameData.elapsedTime >= 180) return;
                if (player.isInvincible) return;

                window.gameData.currentHumanity -= GAME_CONFIG.humanityLossOnHit;
                this.playPulseSound(120, 0.15);
                player.triggerInvincibility();

                const penalty = Math.min(3, this.hordeZombies.length);
                for(let i=0; i<penalty; i++) {
                    let hz = this.hordeZombies.pop();
                    if (hz) hz.destroy();
                }
                window.gameData.totalEscortedCount = this.hordeZombies.length;
                window.gameData.eliteHordeCount = this.hordeZombies.filter(z => z.isElite).length;
                document.getElementById('combo-display').innerText = window.gameData.totalEscortedCount;
                document.getElementById('escort-display').innerText = window.gameData.totalEscortedCount;
                
                player.x += 35; // 우측 밀림
                showSubtitle(`좀비 독액 피격! 인간성 감소! 군단 어그로 이탈.`, 1500);

                if (window.gameData.currentHumanity <= 0) {
                    this.triggerGameOverInfection();
                }
            }

            handleItemCollect(player, item) {
                if (item.isPill) {
                    // 알약 획득
                    item.destroy();
                    addPillCount(1);
                    window.gameData.currentHumanity = Math.min(GAME_CONFIG.maxHumanity, window.gameData.currentHumanity + GAME_CONFIG.humanityRestorePill);
                    this.playPulseSound(440, 0.08); // 청량한 피치톤
                    showSubtitle("인간성 알약 흡수! 정신력 회복 (+20)", 1500);
                }
            }

            // ==========================================
            // 7. 스테이지 전환 연출
            // ==========================================
            checkTimelineStageTransitions() {
                if (this.stageIndex >= GAME_CONFIG.stages.length - 1) return;

                const nextStageConfig = GAME_CONFIG.stages[this.stageIndex + 1];
                if (window.gameData.elapsedTime >= nextStageConfig.time) {
                    this.stageIndex++;
                    this.transitionToNextStage(nextStageConfig);
                }
            }

            transitionToNextStage(config) {
                this.currentStageConfig = config;
                
                // 화면 1초간 페이드 아웃 연출
                this.cameras.main.fadeOut(800, 0, 0, 0);
                this.cameras.main.once(Phaser.Cameras.Scene2D.Events.FADE_OUT_COMPLETE, () => {
                    
                    // 배경 변경
                    this.updateBackgroundTexture();
                    this.updateGroundTexture();

                    // 적 스폰 주기 변경
                    this.spawnTimer.delay = config.zombieRate / window.gameData.timeScale;

                    this.cameras.main.fadeIn(800, 0, 0, 0);
                    this.showStageBanner(config.name);
                    
                    showSubtitle(`스테이지 돌입: ${config.name}`, 3000);
                });
            }

            updateBackgroundTexture() {
                let colorHex = GAME_CONFIG.stages[this.stageIndex].bgColor;
                
                // 1. 뒷배경 (Distant Sky) 텍스처
                let skyKey = `bg_sky_stage_${this.stageIndex}`;
                if (!this.textures.exists(skyKey)) {
                    let canvas = this.textures.createCanvas(skyKey, 64, 64);
                    let ctx = canvas.context;
                    ctx.fillStyle = this.stageColorToCss(colorHex);
                    ctx.fillRect(0, 0, 64, 64);
                    
                    // 먼 산맥/건물 실루엣
                    ctx.fillStyle = 'rgba(0,0,0,0.1)';
                    if (this.stageIndex === 0) {
                        // Stage 1: 완만한 먼 산맥 실루엣
                        ctx.beginPath();
                        ctx.moveTo(0, 64);
                        ctx.lineTo(16, 44);
                        ctx.lineTo(32, 54);
                        ctx.lineTo(48, 38);
                        ctx.lineTo(64, 64);
                        ctx.fill();
                    } else if (this.stageIndex === 1) {
                        // Stage 2: 멀리 보이는 빌딩 실루엣
                        ctx.fillRect(4, 30, 12, 34);
                        ctx.fillRect(24, 40, 10, 24);
                        ctx.fillRect(44, 25, 14, 39);
                    } else {
                        // Stage 3: 건설 현장 먼 뼈대 실루엣
                        ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.moveTo(10, 64); ctx.lineTo(10, 20);
                        ctx.moveTo(0, 30); ctx.lineTo(40, 30);
                        ctx.moveTo(35, 64); ctx.lineTo(35, 15);
                        ctx.moveTo(20, 25); ctx.lineTo(50, 25);
                        ctx.stroke();
                    }
                    canvas.refresh();
                }
                this.skyBg.setTexture(skyKey);

                // 2. 앞배경 (Midground Details) 텍스처
                let midKey = `bg_mid_stage_${this.stageIndex}`;
                if (!this.textures.exists(midKey)) {
                    let canvas = this.textures.createCanvas(midKey, 128, 128);
                    let ctx = canvas.context;
                    
                    ctx.clearRect(0, 0, 128, 128);
                    
                    if (this.stageIndex === 0) {
                        // Stage 1: 가까운 빌딩 & 주택 실루엣
                        ctx.fillStyle = 'rgba(60, 40, 30, 0.35)';
                        ctx.fillRect(10, 60, 48, 68);
                        ctx.beginPath();
                        ctx.moveTo(4, 60); ctx.lineTo(34, 35); ctx.lineTo(64, 60);
                        ctx.fill();
                        ctx.fillStyle = 'rgba(216, 141, 85, 0.15)';
                        ctx.fillRect(24, 75, 12, 12);
                    } else if (this.stageIndex === 1) {
                        // Stage 2: 폐허 건물 & 펜스 실루엣
                        ctx.fillStyle = 'rgba(20, 30, 50, 0.5)';
                        ctx.fillRect(20, 40, 80, 88);
                        ctx.strokeStyle = 'rgba(255, 0, 127, 0.15)';
                        ctx.strokeRect(30, 50, 60, 20);
                        ctx.fillStyle = 'rgba(20, 30, 50, 0.35)';
                        ctx.fillRect(0, 100, 128, 28);
                    } else {
                        // Stage 3: 철골 크레인 및 펜스 구조
                        ctx.strokeStyle = 'rgba(229, 169, 59, 0.25)';
                        ctx.lineWidth = 4;
                        ctx.beginPath();
                        ctx.moveTo(15, 128); ctx.lineTo(15, 20);
                        ctx.moveTo(15, 30); ctx.lineTo(100, 30);
                        ctx.stroke();
                        
                        ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(40, 80, 48, 48);
                        ctx.beginPath();
                        ctx.moveTo(40, 80); ctx.lineTo(88, 128);
                        ctx.moveTo(88, 80); ctx.lineTo(40, 128);
                        ctx.stroke();
                    }
                    canvas.refresh();
                }
                this.midBg.setTexture(midKey);
            }

            updateGroundTexture() {
                let key = `ground_stage_${this.stageIndex}`;
                if (!this.textures.exists(key)) {
                    let canvas = this.textures.createCanvas(key, 32, 32);
                    let ctx = canvas.context;
                    
                    // 테마에 맞는 바닥색 채우기
                    if (this.stageIndex === 0) ctx.fillStyle = '#8d6e63'; // 저녁 길 흙벽돌 색
                    else if (this.stageIndex === 1) ctx.fillStyle = '#455a64'; // 폐허 아스팔트
                    else ctx.fillStyle = '#37474f'; // 공사장 골조 철판색
                    
                    ctx.fillRect(0, 0, 32, 32);
                    ctx.fillStyle = 'rgba(0,0,0,0.15)';
                    ctx.fillRect(0, 0, 32, 4); // 깊이감 디바이드선
                    canvas.refresh();
                }
                this.ground.setTexture(key);
            }

            stageColorToCss(hex) {
                return '#' + String(hex.toString(16)).padStart(6, '0');
            }

            showStageBanner(name) {
                const banner = this.add.text(400, 160, name, {
                    fontFamily: 'Orbitron',
                    fontSize: '24px',
                    fontWeight: 'bold',
                    fill: '#ffffff',
                    stroke: '#000000',
                    strokeThickness: 4
                }).setOrigin(0.5).setDepth(20).setAlpha(0);

                this.tweens.add({
                    targets: banner,
                    alpha: 1,
                    y: 120,
                    duration: 600 / window.gameData.timeScale,
                    yoyo: true,
                    hold: 1500 / window.gameData.timeScale,
                    onComplete: () => {
                        banner.destroy();
                    }
                });
                
                document.getElementById('stage-name-display').innerText = name.split(' ')[0];
            }

            // ==========================================
            // 8. 조작 박탈 및 엔딩 돌입 제어
            // ==========================================
            triggerGameOverInfection() {
                if (this.isGameOver) return;
                this.isGameOver = true;

                // 플레이 도중 인간성 0: 좀비 감염 패배 연출 (쓰러짐 + 좀비 떼 덮침)
                this.physics.pause();
                
                // 플레이어 쓰러짐 연출 (-90도 꺾여 눕는 형태)
                this.player.angle = -90;
                this.player.setTexture('player_infected');
                
                // 주위 좀비들이 덮치는 비주얼 연출
                for (let i = 0; i < 8; i++) {
                    const rx = this.player.x + Phaser.Math.Between(-30, 30);
                    const ry = this.player.y + Phaser.Math.Between(-30, 30);
                    const swarmZombie = this.add.sprite(rx, ry, 'zombie_normal');
                    swarmZombie.setDepth(12); // 플레이어보다 위에 렌더링
                    swarmZombie.angle = Phaser.Math.Between(-45, 45);
                    
                    this.tweens.add({
                        targets: swarmZombie,
                        scale: 1.1,
                        x: this.player.x + Phaser.Math.Between(-8, 8),
                        y: this.player.y + Phaser.Math.Between(-8, 8),
                        duration: 300 / window.gameData.timeScale,
                        ease: 'Bounce.easeOut'
                    });
                }

                stopSynthBeat();
                if (window.bgmPlayer) window.bgmPlayer.pause();

                showSubtitle("그녀는 쓰러졌고, 무자비한 좀비 떼가 그녀를 덮쳐왔다...", 4000);

                this.time.delayedCall(3000 / window.gameData.timeScale, () => {
                    this.cameras.main.fadeOut(1500, 0, 0, 0);
                    this.cameras.main.once(Phaser.Cameras.Scene2D.Events.FADE_OUT_COMPLETE, () => {
                        // HUD 오프
                        document.getElementById('hud-overlay').style.display = 'none';
                        
                        // 게임오버 화면 출력
                        this.add.text(400, 150, '[ BAD ENDING: 좀비화 감염 ]', {
                            fontFamily: 'Noto Sans KR', fontSize: '24px', fill: '#ff0055', fontWeight: 'bold'
                        }).setOrigin(0.5);

                        this.add.text(400, 210, `생존 거리: ${Math.floor(window.gameData.distanceWalked)}m`, {
                            fontFamily: 'Noto Sans KR', fontSize: '14px', fill: '#ffffff'
                        }).setOrigin(0.5);

                        // 재도전 버튼
                        const restartBtn = this.add.rectangle(400, 280, 160, 40, 0x333333).setInteractive({ useHandCursor: true });
                        this.add.text(400, 280, '다시 시작', { fontFamily: 'Noto Sans KR', fontSize: '14px', fill: '#fff' }).setOrigin(0.5);
                        restartBtn.on('pointerdown', () => {
                            window.location.reload();
                        });
                    });
                });
            }



        triggerEpilogueSequence() {
            // 에필로그 270초 생존 도달: 페이드아웃 후 절벽 에필로그 연출 씬 시작
            this.scene.stop('PlayScene');
            this.scene.start('EndingScene');
        }

        syncTimeToStage(seconds) {
            // 디버그용 시간 이동 시 배경 및 인덱스 동기화 맞춤
            if (seconds >= GAME_CONFIG.stages[2].time) {
                this.stageIndex = 2;
            } else if (seconds >= GAME_CONFIG.stages[1].time) {
                this.stageIndex = 1;
            } else {
                this.stageIndex = 0;
            }
            this.currentStageConfig = GAME_CONFIG.stages[this.stageIndex];
            this.updateBackgroundTexture();
            this.updateGroundTexture();
        }

        playPulseSound(freq, dur) {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur - 0.02);
            osc.start(ctx.currentTime);
            osc.stop(ctx.currentTime + dur);
        }
    }

    // ==========================================
    // 9. ENDING SCENE: 절벽 에필로그 걷기 및 최종 분기
    // ==========================================
    class EndingScene extends Phaser.Scene {
        constructor() {
            super('EndingScene');
            this.cutsceneActive = true;
            this.endingTriggered = false;
        }

        create() {
            this.cutsceneActive = true;
            this.endingTriggered = false;
            
            // BGM 아웃로 테마 연출 싱크 확인
            if (window.bgmPlayer && window.gameData.bgmSelected) {
                window.bgmPlayer.currentTime = GAME_CONFIG.epilogueTime;
            }

            // HUD 갱신용 활성 오버레이 (시간 고정)
            document.getElementById('hud-overlay').style.display = 'block';
            document.getElementById('stage-name-display').innerText = "공사장 절벽";

            this.cameras.main.fadeIn(1000, 0, 0, 0);
            this.cameras.main.setBackgroundColor('#111625');

            // 물리 기저 생성 (절벽과 Excavator 배치)
            this.groundY = 320;
            
            // X: 0 ~ X: 350 구간만 땅을 그리고, 좌측 절벽 낭떠러지 형성
            // EX2 스크린샷과 일치: 좌측 절벽 낭떠러지, 지면은 오른쪽에 뻗음
            // 따라서 벼랑은 X: 250 지점쯤에 떨어지게 구현 (250 이하는 낭떠러지 공중)
            this.cliffEdgeX = 220;
            
            this.cliffBase = this.add.rectangle(this.cliffEdgeX + 290, this.groundY + 40, 580, 80, 0x5d4037).setOrigin(0.5);
            // 깎아내린 절벽 단면
            this.cliffWall = this.add.rectangle(this.cliffEdgeX, 360, 4, 80, 0x3d2723);

            // 우측 포크레인(Excavator) 사각형 데코레이션 탑재 (EX2 스크린샷 굴착기 위치 매칭)
            this.createExcavatorDeco(620, this.groundY - 12);

            // 주인공 생성 (감염 진행된 상태인 player_infected 색상 적용)
            this.player = this.physics.add.sprite(750, this.groundY - 16, 'player_infected');
            this.player.setDepth(10);
            
            // 터덜터덜 절벽으로 21초 동안 자동 전진 (LERP 및 강제 애니메이션 효과)
            // 좌향 주행이므로 X: 750 -> X: 240 (절벽 끝) 지점까지 21초간 이동
            this.tweens.add({
                targets: this.player,
                x: this.cliffEdgeX + 25,
                duration: 21000 / window.gameData.timeScale,
                ease: 'Linear'
            });

            // 좀비 무리들이 플레이어 바로 뒤로 조여오며 줄지어 따라오기 연출 (EX2 스크린샷 매칭)
            this.zombies = [];
            const zombieCount = Math.max(12, Math.min(30, window.gameData.totalEscortedCount));
            const eliteCount = window.gameData.eliteHordeCount || 0;
            for (let i = 0; i < zombieCount; i++) {
                let rx = 800 + i * 20 + Phaser.Math.Between(-10, 10);
                let ry = 310 + Phaser.Math.Between(-15, 15);
                let z = this.physics.add.sprite(rx, ry, 'zombie_normal');
                z.setDepth(5);
                
                // 앞에서부터 eliteCount 만큼 엘리트 좀비 비주얼 지정
                if (i < eliteCount) {
                    z.setTint(0xff5555);
                    z.setScale(1.25);
                }
                
                this.zombies.push(z);
                
                // 플레이어 뒤쪽 일정 갭(x + 50)을 유지하며 추적
                this.tweens.add({
                    targets: z,
                    x: {
                        getEnd: (target, key, value) => {
                            return this.cliffEdgeX + 70 + (i * 12);
                        }
                    },
                    duration: 21000 / window.gameData.timeScale,
                    ease: 'Linear'
                });
            }

            showSubtitle("4분 30초: 마침내 막다른 절벽에 도달했다. (자동 이동 연출)", 5000);
        }

        createExcavatorDeco(x, y) {
            // 사각형 블록 조립형 포크레인 (EX2 이미지와 최대한 흡사한 실루엣 연출)
            const mainBody = this.add.rectangle(x, y, 64, 32, 0xe5a93b).setDepth(4); // 바디 노란색
            const track = this.add.rectangle(x, y + 16, 72, 10, 0x333333).setDepth(5); // 궤도 검정
            const cab = this.add.rectangle(x - 16, y - 24, 24, 20, 0x222222).setDepth(4); // 운전석 검정
            const arm1 = this.add.rectangle(x + 24, y - 16, 8, 32, 0xe5a93b).setDepth(3); // 붐대 1
            arm1.angle = -35;
            const arm2 = this.add.rectangle(x + 40, y - 36, 6, 24, 0xe5a93b).setDepth(3); // 붐대 2
            arm2.angle = 45;
        }

        update(time, delta) {
            const modifiedDelta = delta * window.gameData.timeScale;
            
            if (window.gameData.bgmSelected && window.bgmPlayer.src) {
                window.gameData.elapsedTime = window.bgmPlayer.currentTime;
            } else {
                window.gameData.elapsedTime += (modifiedDelta / 1000);
            }

            // HUD 오버레이 시간 고정 리프레시
            const min = Math.floor(window.gameData.elapsedTime / 60);
            const sec = Math.floor(window.gameData.elapsedTime % 60);
            const padSec = String(sec).padStart(2, '0');
            document.getElementById('time-display').innerText = `${min}:${padSec} / 04:51`;

            // 매 프레임 캐릭터 걸어가는 듯한 상하 바운싱 모션 강제 주입
            if (this.cutsceneActive) {
                this.player.y = (this.groundY - 16) + Math.sin(this.time.now * 0.008) * 3;
                this.zombies.forEach((z, idx) => {
                    z.y = (this.groundY - 16) + Math.sin(this.time.now * 0.006 + idx) * 3;
                });
            }

            // 291초 정각 도달 시 엔딩 결정 분기 실행
            if (window.gameData.elapsedTime >= GAME_CONFIG.endingTime && !this.endingTriggered) {
                this.endingTriggered = true;
                this.cutsceneActive = false;
                this.triggerEndingBranch();
            }
        }

        triggerEndingBranch() {
            // 미션 정보 출력 확인
            const isTrue = (
                window.gameData.pillsCollected >= GAME_CONFIG.minPillsForTrueEnding &&
                window.gameData.isScientistRescued === true &&
                window.gameData.maxZombieCombo >= GAME_CONFIG.minComboForTrueEnding
            );

            this.cameras.main.fadeOut(1000, 0, 0, 0);
            this.cameras.main.once(Phaser.Cameras.Scene2D.Events.FADE_OUT_COMPLETE, () => {
                if (isTrue) {
                    this.playTrueEnding();
                } else {
                    this.playNormalEnding();
                }
            });
        }

        // ==========================================
        // 10. 엔딩 분기 세부 연출 (성공 vs 실패)
        // ==========================================
        
        // 10-1. 일반 엔딩 (Normal Ending): 동귀어진 낙하
        playNormalEnding() {
            // 비디오 가용한지 확인
            if (!window.gameData.useEndingNormalFallback) {
                this.runNormalEndingVideo();
            } else {
                this.runNormalEndingFallback();
            }
        }

        runNormalEndingVideo() {
            try {
                this.cameras.main.fadeIn(500, 0, 0, 0);
                let vid = this.add.video(400, 200, 'ending_norm_vid');
                vid.setDisplaySize(800, 400);
                vid.play();
                
                vid.on('complete', () => {
                    this.showCreditsScreen(false);
                });
                
                vid.on('error', () => {
                    this.runNormalEndingFallback();
                });
            } catch(e) {
                this.runNormalEndingFallback();
            }
        }

        runNormalEndingFallback() {
            this.cameras.main.fadeIn(1000, 0, 0, 0);
            showSubtitle("씁쓸한 희생: 그녀는 자신을 따르던 무리들을 이끌고 절벽 밑으로 걸어갔다.", 5000);

            // 중력 활성화하여 절벽 밑 낙하 연출 구현
            this.physics.world.setGravityY(400);
            
            // 플레이어 낙하
            this.player.body.setGravityY(400);
            this.player.setVelocityX(-40); // 절벽 왼쪽 아래로 밀림
            
            // 순차적 좀비 낙하
            this.zombies.forEach((z, idx) => {
                this.time.delayedCall(idx * 150 / window.gameData.timeScale, () => {
                    if (z && z.body) {
                        z.body.setGravityY(400);
                        z.setVelocityX(-50 - Math.random() * 30);
                    }
                });
            });

            // 화면 흔들림 효과
            this.cameras.main.shake(2000, 0.005);

            this.time.delayedCall(6000 / window.gameData.timeScale, () => {
                this.showCreditsScreen(false);
            });
        }

        // 10-2. 진 엔딩 (True Ending): 헬리콥터 극적 구출
        playTrueEnding() {
            if (!window.gameData.useEndingTrueFallback) {
                this.runTrueEndingVideo();
            } else {
                this.runTrueEndingFallback();
            }
        }

        runTrueEndingVideo() {
            try {
                this.cameras.main.fadeIn(500, 0, 0, 0);
                let vid = this.add.video(400, 200, 'ending_true_vid');
                vid.setDisplaySize(800, 400);
                vid.play();
                
                vid.on('complete', () => {
                    this.showCreditsScreen(true);
                });

                vid.on('error', () => {
                    this.runTrueEndingFallback();
                });
            } catch(e) {
                this.runTrueEndingFallback();
            }
        }

        runTrueEndingFallback() {
            this.cameras.main.fadeIn(1000, 0, 0, 0);
            showSubtitle("백신 확보, 시민 구출, 군단 유인 완료. 구조 신호 접수!", 4000);

            // 좌측 상공(X: 100, Y: -100)에서 구조 헬기 출현 연출
            const heli = this.physics.add.sprite(-100, 80, 'helicopter');
            heli.setDepth(15);
            
            // 헬기 프로펠러 모사용 간이 흔들림 회전
            this.tweens.add({
                targets: heli,
                angle: { from: -2, to: 2 },
                duration: 50,
                yoyo: true,
                repeat: -1
            });

            // 헬기 화면 중심으로 비행 진입
            this.tweens.add({
                targets: heli,
                x: this.cliffEdgeX + 25,
                y: 120,
                duration: 4000 / window.gameData.timeScale,
                ease: 'Quad.easeOut',
                onComplete: () => {
                    // 구출 밧줄 하강선 렌더링
                    const rope = this.add.line(0, 0, this.cliffEdgeX + 25, 120, this.cliffEdgeX + 25, 300, 0xffffff).setOrigin(0).setLineWidth(2);

                    showSubtitle("극적 구출: 헬기가 하강시킨 사다리에 탑승했다!", 4000);
                    
                    // 플레이어 끌어올리기 연출
                    this.tweens.add({
                        targets: this.player,
                        x: this.cliffEdgeX + 25,
                        y: 140,
                        duration: 3000 / window.gameData.timeScale,
                        ease: 'Power1',
                        onComplete: () => {
                            rope.destroy();
                            
                            // 백신 핑크색 파티클 샤워 연출
                            this.vaccineParticleShower(this.cliffEdgeX + 25, 140);
                            
                            // 헬기 탈출 비행
                            this.tweens.add({
                                targets: [heli, this.player],
                                x: 900,
                                y: -100,
                                duration: 4000 / window.gameData.timeScale,
                                ease: 'Quad.easeIn',
                                onComplete: () => {
                                    showSubtitle("구조 완료. 좀비 바이러스 백신 투여 성공.", 3000);
                                }
                            });
                        }
                    });

                    // 아래 대기 좀비들이 뛰어오르려다 절벽으로 차례로 고꾸라져 낙하
                    this.zombies.forEach((z, idx) => {
                        this.time.delayedCall(idx * 200 / window.gameData.timeScale, () => {
                            if (z && z.body) {
                                z.body.setGravityY(400);
                                z.setVelocityX(-40 - Math.random() * 20);
                                z.setVelocityY(-100); // 절벽 아래로 점프 낙하 느낌
                            }
                        });
                    });
                }
            });

            this.time.delayedCall(12000 / window.gameData.timeScale, () => {
                this.showCreditsScreen(true);
            });
        }

        vaccineParticleShower(x, y) {
            const emitter = this.add.particles(x, y, 'particle_vaccine', {
                speed: { min: -150, max: 150 },
                angle: { min: 0, max: 360 },
                scale: { start: 1.5, end: 0 },
                blendMode: 'ADD',
                lifespan: 1000,
                gravityY: 100,
                maxParticles: 40
            });
            emitter.setDepth(20);
        }

        // 10-3. 스태프롤 / 최종 통계 보드
        showCreditsScreen(isTrue) {
            this.cameras.main.fadeOut(800, 0, 0, 0);
            this.cameras.main.once(Phaser.Cameras.Scene2D.Events.FADE_OUT_COMPLETE, () => {
                document.getElementById('hud-overlay').style.display = 'none';
                stopSynthBeat();
                
                this.cameras.main.fadeIn(1000, 0, 0, 0);
                this.cameras.main.setBackgroundColor('#000000');

                // 엔딩 명칭
                const endingTitle = this.add.text(400, 80, isTrue ? "[ TRUE ENDING: 인류의 여명 ]" : "[ NORMAL ENDING: 희생의 메아리 ]", {
                    fontFamily: 'Noto Sans KR',
                    fontSize: '22px',
                    fontWeight: 'bold',
                    fill: isTrue ? 'var(--neon-cyan)' : 'var(--neon-pink)'
                }).setOrigin(0.5);

                // 반짝임
                this.tweens.add({ targets: endingTitle, alpha: 0.5, duration: 1000, yoyo: true, repeat: -1 });

                // 미션 수행 통계 리포트 보드
                const boardY = 190;
                this.add.text(400, boardY - 40, "=== MISSION DATA REPORT ===", { fontFamily: 'Orbitron', fontSize: '12px', fill: '#8892b0' }).setOrigin(0.5);
                this.add.text(280, boardY, `알약 획득 수: ${window.gameData.pillsCollected}개 (성공 조건: ${GAME_CONFIG.minPillsForTrueEnding}개)`, { fontFamily: 'Noto Sans KR', fontSize: '13px', fill: '#fff' }).setOrigin(0);
                this.add.text(280, boardY + 24, `연구원 구출 수: ${window.gameData.rescuedScientists}명 / 3명 (성공 조건: 3명 이상)`, { fontFamily: 'Noto Sans KR', fontSize: '13px', fill: '#fff' }).setOrigin(0);
                this.add.text(280, boardY + 48, `최대 좀비 콤보 수: ${window.gameData.maxZombieCombo}마리 (성공 조건: ${GAME_CONFIG.minComboForTrueEnding}마리)`, { fontFamily: 'Noto Sans KR', fontSize: '13px', fill: '#fff' }).setOrigin(0);

                // 크레딧 스태프롤
                const credits = this.add.text(400, 310, "Director: User | Framework: Phaser 3 | AI Partner: Antigravity", {
                    fontFamily: 'Orbitron', fontSize: '10px', fill: '#4a5568'
                }).setOrigin(0.5);

                // 재시작 버튼
                const restartBtn = this.add.rectangle(400, 360, 150, 35, isTrue ? 0x00d2fc : 0xff007f).setInteractive({ useHandCursor: true });
                const restartText = this.add.text(400, 360, "메인 화면으로", { fontFamily: 'Noto Sans KR', fontSize: '12px', fill: '#000', fontWeight: 'bold' }).setOrigin(0.5);
                
                restartBtn.on('pointerdown', () => {
                    if (window.bgmPlayer) {
                        window.bgmPlayer.pause();
                        window.bgmPlayer.currentTime = 0;
                    }
                    window.location.reload();
                });
            });
        }

        jumpTime(targetSec) {
            // 에필로그 시간 가속 제어
            this.endingTriggered = false;
        }
    }

    // ==========================================
    // 11. 엔티티 클래스 구현 (Player, Zombie)
    // ==========================================
    
    // 11-1. 플레이어 클래스
    class Player extends Phaser.GameObjects.Sprite {
        constructor(scene, x, y) {
            super(scene, x, y, 'player_normal');
            scene.add.existing(this);
            scene.physics.add.existing(this);
            
            this.scene = scene;
            this.setDepth(10);
            this.body.setCollideWorldBounds(true);
            this.body.setSize(24, 32); // 충돌체 실보정

            // 상태 속성
            this.isInvincible = false;
            this.isAttacking = false;
            this.attackCooldown = false;
            this.mobileTarget = null;
            this.originalScale = 1;
            
            // 방망이 무기 스프라이트 부착 (공격 시 스윙 가시화)
            this.weapon = scene.add.sprite(x - 20, y, 'weapon_bat');
            this.weapon.setOrigin(0.8, 0.5);
            this.weapon.setDepth(11);
            this.weapon.setVisible(false);
            
            // 기본 방향 설정 (좌향)
            this.setFlipX(false); // 좌향이 기본 텍스처이므로 false
        }

        update(delta) {
            // 게임오버 시 조작 차단
            if (window.gameData.currentHumanity <= 0) return;

            // 1. 인간성 상태 변화에 따른 FSM 텍스처 실시간 스왑
            this.updateHumanity(delta);

            // 2. 키보드 움직임 제어
            let vx = 0;
            let vy = 0;
            const speed = 135;

            if (this.scene.cursors.left.isDown || this.scene.wasd.left.isDown) {
                vx = -speed;
            } else if (this.scene.cursors.right.isDown || this.scene.wasd.right.isDown) {
                vx = speed;
            }

            if (this.scene.cursors.up.isDown || this.scene.wasd.up.isDown) {
                vy = -speed;
            } else if (this.scene.cursors.down.isDown || this.scene.wasd.down.isDown) {
                vy = speed;
            }

            // 모바일 터치 드래그로 타겟 좌표가 들어왔을 시의 이동 보간
            if (this.mobileTarget) {
                const dist = Phaser.Math.Distance.Between(this.x, this.y, this.mobileTarget.x, this.mobileTarget.y);
                if (dist > 8) {
                    const angle = Phaser.Math.Angle.Between(this.x, this.y, this.mobileTarget.x, this.mobileTarget.y);
                    vx = Math.cos(angle) * speed;
                    vy = Math.sin(angle) * speed;
                } else {
                    this.mobileTarget = null;
                }
            }

            // 스케일 속도 보정
            this.body.setVelocity(vx * window.gameData.timeScale, vy * window.gameData.timeScale);

            // 플레이 구역 범위 가두기 조항 (좌측 2/3 영역인 x: 30 ~ x: 530)
            if (this.x < 30) this.x = 30;
            if (this.x > 530) this.x = 530;

            // 상하 움직이는 영역 제한 (화면 바닥 400 기준 5%~40% 영역인 Y: 240 ~ Y: 380)
            if (this.y < 240) this.y = 240;
            if (this.y > 380) this.y = 380;

            // 3. 공격 감지 (Spacebar)
            if (Phaser.Input.Keyboard.JustDown(this.scene.attackKey)) {
                this.swingBat();
            }

            // 무기 배치 동기화 (주인공 몸체 좌측에 배치 - 좌향 공격)
            this.weapon.x = this.x - 12;
            this.weapon.y = this.y + 4;
            
            // 걸어가는 가벼운 틱 진동 효과 (애니메이션 폴백)
            if (vx !== 0 || vy !== 0) {
                this.y += Math.sin(this.scene.time.now * 0.015) * 0.4;
            }
        }

        updateHumanity(delta) {
            // 초당 자연 감소율 적용
            if (delta > 0) {
                window.gameData.currentHumanity -= (GAME_CONFIG.humanityLossPerSec * (delta / 1000));
            }

            const hum = window.gameData.currentHumanity;
            const isStage3 = (window.gameData.elapsedTime >= 180);

            if (isStage3 || hum <= 0) {
                this.setTexture('player_infected'); // 좀비 모드 스프라이트 사용
            } else {
                this.setTexture('player_normal'); // 인간 모드 스프라이트 사용
            }

            // Stage 1 & 2에서 인간성이 0 이하가 되면 즉시 게임오버 트리거
            if (!isStage3 && hum <= 0 && this.scene.isGameOver === false) {
                this.scene.triggerGameOverInfection();
            }
        }

        swingBat() {
            if (this.isAttacking || this.attackCooldown) return;
            
            this.isAttacking = true;
            this.attackCooldown = true;
            this.weapon.setVisible(true);
            this.weapon.angle = 90; // 휘두르기 시작 각도

            // 좌향 스윙 궤적 물리 히트박스 생성 (x좌표 좌측 배치)
            const attackHitbox = new Phaser.Geom.Rectangle(this.x - 65, this.y - 20, 60, 40);

            // 스윙 물리 효과 그리기 디버그용 사각형 임시 플래시
            let swingFlash = null;
            if (window.gameData.showHitboxes) {
                swingFlash = this.scene.add.rectangle(this.x - 35, this.y, 60, 40, 0x00ffff, 0.4);
            }

            // 방망이 회전 트위너
            this.scene.tweens.add({
                targets: this.weapon,
                angle: -90,
                duration: 150 / window.gameData.timeScale,
                onComplete: () => {
                    this.weapon.setVisible(false);
                    this.isAttacking = false;
                    if (swingFlash) swingFlash.destroy();
                }
            });

            // 몬스터 데미지 타격 체킹
            this.scene.hitZombiesWithBat(attackHitbox);

            // 공격 쿨타임 복구
            this.scene.time.delayedCall(GAME_CONFIG.attackCooldown / window.gameData.timeScale, () => {
                this.attackCooldown = false;
            });
        }

        triggerInvincibility() {
            this.isInvincible = true;
            
            // 점멸 깜빡임 이펙트
            this.scene.tweens.add({
                targets: this,
                alpha: 0.2,
                duration: 100,
                yoyo: true,
                repeat: 5,
                onComplete: () => {
                    this.alpha = 1.0;
                    this.isInvincible = false;
                }
            });
        }

        setMobileMoveTarget(x, y) {
            this.mobileTarget = { x, y };
        }

        dieInfection() {
            // 좀비 감염 시 Cyan -> 완전 잿빛 녹색 텍스처 박제
            this.setTexture('zombie_normal');
            this.body.setVelocity(0, 0);
        }
    }

    // 11-2. 좀비 클래스 (오브젝트 풀링 연동 설계)
    class Zombie extends Phaser.GameObjects.Sprite {
        constructor(scene, x, y) {
            super(scene, x, y, 'zombie_normal');
            scene.add.existing(this);
            scene.physics.add.existing(this);
            this.setDepth(6);
            this.body.setCollideWorldBounds(false);
            
            // 초기 비활성
            this.active = false;
            this.visible = false;
            this.zombieType = 'NORMAL';
            this.hp = 1;
            this.speed = 50;
            this.currentState = 'CHASING'; // CHASING, KNOCKBACK, DEAD_FLY
            this.knockbackTimer = 0;
            this.deathRotationSpeed = 8;
            this.passedPlayer = false;
            this.targetBox = null;
            this.boxOffsetY = 0;
        }

        activate(type, hp) {
            this.zombieType = type;
            this.hp = hp;
            this.currentState = 'CHASING';
            this.angle = 0;
            this.alpha = 1.0;
            
            this.setActive(true);
            this.setVisible(true);
            this.setDepth(6);
            this.passedPlayer = false;
            this.setTint(0xffffff); // 기존 틴트 제거
            this.setScale(1.0);     // 기존 스케일 리셋
            this.targetBox = null;
            this.boxOffsetY = 0;

            if (type === 'NORMAL') {
                this.setTexture('zombie_normal');
                this.speed = 50 + Math.random() * 20;
                
                // 체력 2~3인 엘리트 좀비 비주얼/속도 튜닝
                if (hp > 1) {
                    this.setTint(0xff5555); // 붉은 핏빛 틴트 적용
                    this.setScale(1.25);    // 크기 확대
                    this.speed = 65 + Math.random() * 20; // 조금 더 빠르게 추적
                }
            } else if (type === 'RUNNER') {
                this.setTexture('zombie_runner');
                this.speed = 300; // 대시 폭격
                if (this.runnerDirection === undefined) {
                    this.runnerDirection = -1;
                }
                this.setFlipX(this.runnerDirection === 1);
            } else if (type === 'STALKER') {
                this.setTexture('zombie_stalker');
                this.speed = 40;
            } else if (type === 'SPITTER') {
                this.setTexture('zombie_spitter');
                this.speed = 50;
                this.lastSpitTime = 0;
            }
        }

        update(time, delta) {
            if (!this.active) return;
            const modifiedDelta = delta * window.gameData.timeScale;

            if (this.currentState === 'CHASING') {
                // 플레이어를 쫓는 AI 알고리즘
                const player = this.scene.player;
                
                let vx = 0;
                let vy = 0;

                // 상자 추적/매달리기 분기
                if (this.targetBox) {
                    if (this.targetBox.active && this.targetBox.scene) {
                        vx = 60; // 상자 속도
                        const targetY = this.targetBox.y + this.boxOffsetY;
                        vy = (targetY > this.y) ? 60 : -60;
                        if (Math.abs(targetY - this.y) < 5) vy = 0;
                    } else {
                        this.targetBox = null;
                    }
                }

                if (!this.targetBox) {
                    // NORMAL은 좌측 스폰하여 우측에 있는 플레이어를 향해 쫓아옴
                    // RUNNER는 우측 경고 생성 후 플레이어를 좌향으로 강타 돌진
                    if (this.zombieType === 'NORMAL') {
                        // X축: 플레이어 방향(오른쪽)으로 전진
                        vx = this.speed;
                        // 플레이어보다 왼쪽에 있을 때만 Y축 추종, 플레이어를 지나치면 Y축 고정 (뒤로 자연스럽게 스쳐 지나가게 처리)
                        if (this.x < player.x + 20) {
                            vy = (player.y > this.y) ? this.speed * 0.5 : -this.speed * 0.5;
                            this.passedPlayer = false;
                        } else {
                            vy = 0;
                            this.passedPlayer = true;
                        }
                    } else if (this.zombieType === 'RUNNER') {
                        // 일직선 극강의 대시 질주 (Y고정, X축 좌향/우향 돌격)
                        vx = this.speed * this.runnerDirection;
                        if (this.runnerDirection === -1) {
                            this.passedPlayer = (this.x < player.x - 20);
                        } else {
                            this.passedPlayer = (this.x > player.x + 20);
                        }
                    } else if (this.zombieType === 'STALKER') {
                        // 사방 압박형 스토커 추적
                        const angle = Phaser.Math.Angle.Between(this.x, this.y, player.x, player.y);
                        vx = Math.cos(angle) * this.speed;
                        vy = Math.sin(angle) * this.speed;
                    } else if (this.zombieType === 'SPITTER') {
                        // SPITTER는 x: 120까지 걸어온 후 멈춰서 플레이어를 향해 침 발사
                        if (this.x < 120) {
                            vx = this.speed;
                            vy = 0;
                        } else {
                            vx = 0;
                            vy = 0;
                            const now = this.scene.time.now;
                            if (now - this.lastSpitTime > 2000 / window.gameData.timeScale) {
                                this.lastSpitTime = now;
                                this.spitAtPlayer();
                            }
                        }
                    }
                }

                this.body.setVelocity(vx * window.gameData.timeScale, vy * window.gameData.timeScale);

                // 좀비 걷기 바운싱 진동감 부여
                this.y += Math.sin(this.scene.time.now * 0.01 + this.x) * 0.2;

                // 화면 밖 무의미하게 멀어지거나 뒤로 나가면 자동 deactive 풀 반환
                if (this.zombieType === 'NORMAL' && this.x > 840) {
                    this.deactivate();
                }
                if (this.zombieType === 'RUNNER') {
                    if (this.runnerDirection === -1 && this.x < -40) {
                        this.deactivate();
                    } else if (this.runnerDirection === 1 && this.x > 840) {
                        this.deactivate();
                    }
                }

            } else if (this.currentState === 'KNOCKBACK') {
                // 피격 넉백
                this.knockbackTimer -= modifiedDelta;
                if (this.knockbackTimer <= 0) {
                    this.currentState = 'CHASING';
                }

            } else if (this.currentState === 'DEAD_FLY') {
                // 사망 시 회전 날아가기
                this.angle += (this.deathRotationSpeed * window.gameData.timeScale);
                
                // 포물선 수동 연출 프레임 단위 이동 및 속도 반영
                this.x += this.flyVx * (modifiedDelta / 1000);
                this.y += this.flyVy * (modifiedDelta / 1000);
                this.flyVy += this.flyGravity * (modifiedDelta / 1000);
                
                // 화면 우측 또는 아래로 완전히 사라졌는지 판정 (X축 화면 밖으로 멀리 보내기)
                if (this.x > 850 || this.y > 500) {
                    // 뒤쪽 콤보 무리(Grouping) 목록으로 통합 이적
                    this.scene.addZombiesToHorde(1, this.isElite);
                    this.deactivate();
                }
            }
        }

        takeDamage() {
            this.hp--;
            if (this.hp <= 0) {
                // 죽음 연출 진입
                this.currentState = 'DEAD_FLY';
                this.body.setEnable(false); // 물리 실선 비활성화로 렉 방지
                
                // 포물선 날아갈 속도와 중력 설정 (가로로 더 멀리 날아가도록 조정)
                this.flyVx = 580;
                this.flyVy = -400; // 위쪽 튕김은 살짝 줄임
                this.flyGravity = 600; // 중력을 절반으로 낮춰 처지지 않고 X축 밖으로 유도
                this.deathRotationSpeed = (Math.random() > 0.5) ? 8 : -8;
                
                // 좀비 녹색 피 사격 파티클 이펙트
                this.zombieGreenBurst(this.x, this.y);


            } else {
                // 체력 남았을 시 넉백
                this.currentState = 'KNOCKBACK';
                this.knockbackTimer = 250; // 0.25초 넉백 유지
                // 피격 시 현재 X축 이동방향의 정반대 방향으로 넉백 적용
                const kbDir = (this.body.velocity.x > 0) ? -1 : 1;
                this.body.setVelocity(kbDir * 280 * window.gameData.timeScale, 0); // 반대편으로 크게 튕겨남
            }
        }

        zombieGreenBurst(x, y) {
            const emitter = this.scene.add.particles(x, y, 'particle_zombie', {
                speed: { min: -120, max: 120 },
                angle: { min: 0, max: 360 },
                scale: { start: 1, end: 0 },
                lifespan: 500,
                gravityY: 200,
                maxParticles: 8
            });
            emitter.setDepth(10);
        }

        deactivate() {
            this.setActive(false);
            this.setVisible(false);
            this.body.setVelocity(0, 0);
            this.body.setEnable(true); // 재활용 시 대비 물리 바운드 복구
        }

        spitAtPlayer() {
            if (!this.active || this.currentState !== 'CHASING') return;
            const player = this.scene.player;
            const spitX = this.x + 16;
            const spitY = this.y;
            
            const spit = this.scene.spitProjectiles.create(spitX, spitY, 'spit_acid');
            spit.setDepth(5);
            spit.body.setSize(8, 8);
            
            const angle = Phaser.Math.Angle.Between(spitX, spitY, player.x, player.y);
            const spitSpeed = 250;
            spit.body.setVelocity(Math.cos(angle) * spitSpeed * window.gameData.timeScale, Math.sin(angle) * spitSpeed * window.gameData.timeScale);
        }
    }

    // ==========================================
    // 12. Phaser 게임 부트 기동 스크립트
    // ==========================================
    const config = {
        type: Phaser.AUTO,
        parent: 'phaser-game',
        width: GAME_CONFIG.width,
        height: GAME_CONFIG.height,
        pixelArt: true,
        scale: {
            mode: Phaser.Scale.FIT,
            autoCenter: Phaser.Scale.CENTER_BOTH
        },
        dom: {
            createContainer: true // HTML 엘리먼트 오버레이 바인딩 활성화
        },
        physics: {
            default: 'arcade',
            arcade: {
                gravity: { y: 0 },
                debug: false
            }
        },
        scene: [BootScene, TitleScene, IntroScene, PlayScene, EndingScene]
    };

    const phaserGame = new Phaser.Game(config);
</script>
