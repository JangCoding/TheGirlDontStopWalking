<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Girl Did Not Stop Walking</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Press+Start+2P&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <!-- Phaser 3 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        :root {
            --neon-pink: #ff007f;
            --neon-cyan: #00d2fc;
            --neon-green: #2ebd59;
            --bg-dark: #0a0b10;
            --panel-bg: rgba(18, 20, 32, 0.85);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Noto Sans KR', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at center, #1a1a2e 0%, #0a0b10 100%);
        }

        #app-wrapper {
            position: relative;
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            gap: 20px;
            max-width: 1200px;
            width: 100%;
            padding: 20px;
        }

        /* 게임 영역 스타일링 */
        #game-container-wrapper {
            position: relative;
            width: 800px;
            height: 400px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 210, 252, 0.2), 
                        inset 0 0 20px rgba(0, 0, 0, 0.8);
            border: 3px solid var(--neon-cyan);
            background-color: #000;
        }

        #phaser-game {
            width: 100%;
            height: 100%;
        }

        /* CRT 스캔라인 효과 */
        #crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
            z-index: 10;
            opacity: 0.75;
        }

        #crt-vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-shadow: inset 0 0 80px rgba(0,0,0,0.8);
            pointer-events: none;
            z-index: 11;
        }

        /* HTML HUD 오버레이 */
        #hud-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
            padding: 15px;
            display: none; /* PlayScene 진입 시 JS에서 block으로 켬 */
            font-family: 'Orbitron', 'Press Start 2P', sans-serif;
        }

        .hud-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .hud-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 8px 12px;
            backdrop-filter: blur(8px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .hud-title {
            font-size: 10px;
            color: #8892b0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .hud-value {
            font-size: 16px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 0 5px rgba(255,255,255,0.5);
        }

        /* 인간성 게이지 바 */
        #humanity-container {
            width: 220px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        #humanity-bar-outer {
            width: 100%;
            height: 14px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--neon-cyan);
            border-radius: 4px;
            overflow: hidden;
            box-shadow: inset 0 0 4px rgba(0, 212, 252, 0.5);
        }

        #humanity-bar-inner {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, var(--neon-cyan) 0%, #0077ff 100%);
            box-shadow: 0 0 8px var(--neon-cyan);
            transition: width 0.1s ease, background 0.3s ease;
        }

        /* 디버그/개발자 패널 */
        #debug-panel {
            width: 320px;
            background: var(--panel-bg);
            border: 2px solid var(--neon-pink);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.15);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        #debug-panel h2 {
            margin: 0;
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            color: var(--neon-pink);
            text-shadow: 0 0 8px rgba(255, 0, 127, 0.4);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #debug-panel h2 span {
            font-size: 10px;
            background: rgba(255, 0, 127, 0.2);
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid var(--neon-pink);
        }

        .debug-section {
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 10px;
        }

        .debug-section:last-child {
            border: none;
            padding-bottom: 0;
        }

        .debug-title {
            font-size: 11px;
            color: #8892b0;
            margin-bottom: 6px;
            font-weight: bold;
        }

        .debug-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
        }

        .debug-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 6px 8px;
            font-size: 11px;
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            font-family: 'Noto Sans KR', sans-serif;
        }

        .debug-btn:hover {
            background: rgba(255, 0, 127, 0.2);
            border-color: var(--neon-pink);
            box-shadow: 0 0 8px rgba(255, 0, 127, 0.3);
        }

        .debug-btn.active {
            background: var(--neon-pink);
            border-color: var(--neon-pink);
        }

        .debug-slider-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 5px;
        }

        .debug-slider {
            flex: 1;
            accent-color: var(--neon-pink);
            cursor: pointer;
        }

        .debug-slider-val {
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            width: 35px;
            text-align: right;
        }

        /* 로컬 음원 업로드 오버레이용 스타일 */
        .custom-file-upload {
            display: inline-block;
            padding: 6px 12px;
            cursor: pointer;
            background: rgba(0, 210, 252, 0.1);
            border: 1px dashed var(--neon-cyan);
            border-radius: 4px;
            font-size: 11px;
            color: var(--neon-cyan);
            text-align: center;
            width: 100%;
            transition: all 0.2s;
        }

        .custom-file-upload:hover {
            background: rgba(0, 210, 252, 0.2);
            box-shadow: 0 0 8px rgba(0, 210, 252, 0.3);
        }

        input[type="file"] {
            display: none;
        }

        /* 자막 컨테이너 (비디오 폴백용) */
        #subtitle-overlay {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 16px;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8), 0 0 10px rgba(0, 212, 252, 0.5);
            background: rgba(0,0,0,0.6);
            padding: 6px 20px;
            border-radius: 6px;
            pointer-events: none;
            z-index: 8;
            display: none;
            max-width: 80%;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="app-wrapper">
    <!-- 게임 뷰포트 -->
    <div id="game-container-wrapper">
        <!-- CRT 스캔라인 특수효과 -->
        <div id="crt-overlay"></div>
        <div id="crt-vignette"></div>
        
        <!-- HTML HUD (Phaser Canvas 위에 렌더링) -->
        <div id="hud-overlay">
            <!-- 상단 바 -->
            <div class="hud-row">
                <!-- 인간성 게이지 -->
                <div class="hud-card" id="humanity-container">
                    <div style="display: flex; justify-content: space-between; width: 100%;">
                        <span class="hud-title">Humanity</span>
                        <span class="hud-value" id="humanity-text">100%</span>
                    </div>
                    <div id="humanity-bar-outer">
                        <div id="humanity-bar-inner"></div>
                    </div>
                </div>

                <!-- 스테이지 이름 및 남은 시간 -->
                <div class="hud-card" style="flex-direction: column; align-items: center; min-width: 180px;">
                    <span class="hud-title" id="stage-name-display" style="color: var(--neon-cyan);">저녁 길가</span>
                    <span class="hud-value" id="time-display">00:00 / 04:51</span>
                </div>

                <!-- 좀비 콤보 및 알약, 연구원 수 -->
                <div style="display: flex; gap: 8px;">
                    <div class="hud-card">
                        <span class="hud-title">Combo</span>
                        <span class="hud-value" id="combo-display" style="color: var(--neon-green);">0</span>
                    </div>
                    <div class="hud-card">
                        <span class="hud-title">Pills</span>
                        <span class="hud-value" id="pills-display" style="color: var(--neon-pink);">0</span>
                    </div>
                </div>
            </div>

            <!-- 하단 바 -->
            <div class="hud-row" style="position: absolute; bottom: 15px; left: 15px; right: 15px; margin-bottom: 0;">
                <div style="display: flex; gap: 8px;">
                    <!-- 캐릭터 초상화 오버레이 -->
                    <div class="hud-card" id="portrait-card" style="padding: 4px 8px; gap: 8px;">
                        <div id="portrait-box" style="width: 24px; height: 24px; border-radius: 4px; background-color: var(--neon-cyan); border: 1px solid #fff; box-shadow: 0 0 6px var(--neon-cyan); transition: all 0.3s;"></div>
                        <div style="display: flex; flex-direction: column;">
                            <span class="hud-title" style="font-size: 8px; line-height: 1; margin-bottom: 2px;">Portrait</span>
                            <span id="portrait-status" style="font-size: 10px; font-weight: bold; color: var(--neon-cyan);">HUMAN</span>
                        </div>
                    </div>

                    <div class="hud-card">
                        <span class="hud-title">Distance</span>
                        <span class="hud-value" id="distance-display">0m</span>
                    </div>
                </div>
                
                <div class="hud-card" id="rescued-card" style="display: none; border-color: var(--neon-cyan);">
                    <span class="hud-title" style="color: var(--neon-cyan);">CIVILIAN RESCUED</span>
                    <span class="hud-value" id="rescued-status" style="color: #fff;">NO</span>
                </div>

                <div class="hud-card">
                    <span class="hud-title">Zombies Escorted</span>
                    <span class="hud-value" id="escort-display">0</span>
                </div>
            </div>
        </div>

        <!-- 비디오 폴백 자막 오버레이 -->
        <div id="subtitle-overlay"></div>

        <!-- Phaser 게임 인스턴스 부착점 -->
        <div id="phaser-game"></div>
    </div>

    <!-- 개발자용 실시간 디버그 패널 -->
    <div id="debug-panel">
        <h2>
            DEVELOPER PANEL
            <span>DEBUG MODE</span>
        </h2>

        <!-- 시간 및 스테이지 스킵 -->
        <div class="debug-section">
            <div class="debug-title">게임 시간 및 스테이지 점프</div>
            <div class="debug-grid">
                <button class="debug-btn" onclick="jumpToStage(0)">Stage 1 (저녁)</button>
                <button class="debug-btn" onclick="jumpToStage(90)">Stage 2 (폐허)</button>
                <button class="debug-btn" onclick="jumpToStage(180)">Stage 3 (공사장)</button>
                <button class="debug-btn" onclick="jumpToStage(265)">Epilogue (265초)</button>
            </div>
        </div>

        <!-- 게임 배속 조절 -->
        <div class="debug-section">
            <div class="debug-title">게임 진행 배속 (Time Scale)</div>
            <div class="debug-grid" style="grid-template-columns: repeat(4, 1fr);">
                <button class="debug-btn active" id="ts-1" onclick="setGameTimeScale(1)">1x</button>
                <button class="debug-btn" id="ts-2" onclick="setGameTimeScale(2)">2x</button>
                <button class="debug-btn" id="ts-5" onclick="setGameTimeScale(5)">5x</button>
                <button class="debug-btn" id="ts-10" onclick="setGameTimeScale(10)">10x</button>
            </div>
        </div>

        <!-- 인간성 제어 -->
        <div class="debug-section">
            <div class="debug-title">인간성 수치 제어 (Humanity)</div>
            <div class="debug-slider-group">
                <input type="range" min="0" max="100" value="100" class="debug-slider" id="humanity-slider" oninput="adjustHumanity(this.value)">
                <span class="debug-slider-val" id="humanity-slider-val">100</span>
            </div>
        </div>

        <!-- 미션 데이터 강제 조작 -->
        <div class="debug-section">
            <div class="debug-title">미션 조건 강제 달성 (엔딩 분기용)</div>
            <div class="debug-grid">
                <button class="debug-btn" onclick="addPillCount(1)">알약 +1개</button>
                <button class="debug-btn" id="btn-rescue" onclick="toggleRescueStatus()">시민구출: NO</button>
                <button class="debug-btn" onclick="addZombieCombo(5)">좀비콤보 +5</button>
                <button class="debug-btn" onclick="clearZombies()">화면좀비 클리어</button>
            </div>
        </div>

        <!-- 물리 엔진 디버그 바운딩 박스 그리기 -->
        <div class="debug-section">
            <div class="debug-title">시스템 옵션</div>
            <div class="debug-grid" style="grid-template-columns: 1fr;">
                <button class="debug-btn" id="btn-hitbox" onclick="toggleHitboxDebug()">히트박스 가시화: OFF</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // 1. 게임 글로벌 설정 및 상태 제어 변수들
    // ==========================================
    const GAME_CONFIG = {
        width: 800,
        height: 400,
        
        // 비디오 파일 가상 상대 경로
        videos: {
            opening: './assets/opening.mp4',
            endingNormal: './assets/ending_normal.mp4',
            endingTrue: './assets/ending_true.mp4'
        },

        // 스테이지 타임라인 정의 (BGM 재생 초 기준)
        stages: [
            { time: 0,   name: "저녁 길가 (Evening Street)", bgColor: 0xd88d55, scrollSpeed: 1.5, zombieRate: 2000 },
            { time: 90,  name: "폐허 (Ruins)", bgColor: 0x3a4f7c, scrollSpeed: 2.0, zombieRate: 1500 },
            { time: 180, name: "공사장 (Construction Site)", bgColor: 0x111625, scrollSpeed: 2.5, zombieRate: 1000 }
        ],

        epilogueTime: 270,    // 4분 30초 (에필로그 씬 전환)
        endingTime: 291,      // 4분 51초 (에필로그에서 절벽 끝 도달 후 엔딩 분기 시작)
        
        // 진엔딩 트리거 최저 요구 조건
        minPillsForTrueEnding: 5,
        minComboForTrueEnding: 15,

        // 플레이어 기본 사양
        maxHumanity: 100,
        humanityLossPerSec: 1.5,  // 초당 인간성 기본 감소율
        humanityRestorePill: 20,  // 알약 회복량
        humanityLossOnHit: 10,    // 좀비 접촉 피해
        invincibilityDuration: 1000,
        attackCooldown: 400
    };

    // 전역 상태 변수들 (Phaser와 HTML 디버그 패널 간 브릿지)
    window.gameData = {
        elapsedTime: 0,           // 현재 흐른 게임 시간 (초)
        pillsCollected: 0,        // 획득한 알약 수
        isScientistRescued: false,// 연구원 구출 여부
        maxZombieCombo: 0,        // 최대 실시간 그룹 좀비 수
        totalEscortedCount: 0,    // 지금까지 무리로 만든 좀비 누적 수
        eliteHordeCount: 0,       // 현재 무리에 합류한 엘리트 좀비 수
        distanceWalked: 0,        // 이동 거리 (m)
        currentHumanity: 100,     // 실시간 인간성 수치
        timeScale: 1,             // 게임 배속 배율
        showHitboxes: false,      // 물리 디버그 플래그
        bgmSelected: false,       // 유저 선택 BGM 유무
        useOpeningFallback: true, // 오프닝 영상 로드 에러 시 폴백 전환용 플래그
        useEndingNormalFallback: true,
        useEndingTrueFallback: true
    };

    // BGM 오디오 플레이어 인스턴스 (HTML5 Audio 사용)
    window.bgmPlayer = new Audio();
    window.bgmPlayer.loop = false; // 타임라인 동기화 완결을 위해 루프 끔
    window.bgmPlayerVolume = 0.5;
    window.bgmPlayer.volume = window.bgmPlayerVolume;

    // Web Audio API 오디오 합성용 폴백 플레이어 (유저 음악 없을 때 구동)
    let synthInterval = null;
    function startSynthBeat() {
        if (synthInterval) clearInterval(synthInterval);
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        synthInterval = setInterval(() => {
            if (window.bgmPlayer && !window.bgmPlayer.paused) return; // 유저 음악 실행 중이면 합성 끔
            // 단순 템포 비트음 생성
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.frequency.value = (window.gameData.elapsedTime >= GAME_CONFIG.epilogueTime) ? 100 : 150; // 에필로그 시 아웃로 묵직한 톤
            gain.gain.setValueAtTime(0.08, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
            osc.start(ctx.currentTime);
            osc.stop(ctx.currentTime + 0.35);
        }, 1000); // 1초 주기의 메트로놈성 비트 폴백
    }

    function stopSynthBeat() {
        if (synthInterval) {
            clearInterval(synthInterval);
            synthInterval = null;
        }
    }

    // ==========================================
    // 2. 디버그 조작 API 정의 (HTML UI 연동)
    // ==========================================
    function jumpToStage(targetSec) {
        window.gameData.elapsedTime = targetSec;
        if (window.bgmPlayer && window.bgmPlayer.src && !window.bgmPlayer.paused) {
            window.bgmPlayer.currentTime = targetSec;
        }
        
        // Phaser 현재 활성화된 씬 받아오기
        const activeScene = phaserGame.scene.getScene('PlayScene');
        if (phaserGame.scene.isActive('PlayScene') && activeScene) {
            activeScene.syncTimeToStage(targetSec);
        } else if (phaserGame.scene.isActive('EndingScene')) {
            // 에필로그 도중 앞 시간으로 건너뛰면 다시 PlayScene으로 돌아감
            if (targetSec < GAME_CONFIG.epilogueTime) {
                phaserGame.scene.stop('EndingScene');
                phaserGame.scene.start('PlayScene');
            } else {
                // EndingScene 내부에서 시간 이동
                const endingScene = phaserGame.scene.getScene('EndingScene');
                if (endingScene) endingScene.jumpTime(targetSec);
            }
        } else if (phaserGame.scene.isActive('IntroScene')) {
            // 오프닝 영상 스킵
            const introScene = phaserGame.scene.getScene('IntroScene');
            if (introScene) introScene.skipIntro();
        }
    }

    function setGameTimeScale(scale) {
        window.gameData.timeScale = scale;
        // 디버그 패널 액티브 상태 갱신
        document.querySelectorAll('#debug-panel .debug-btn[id^="ts-"]').forEach(btn => {
            btn.classList.remove('active');
        });
        document.getElementById(`ts-${scale}`).classList.add('active');
        
        // 오디오 재생 속도도 싱크
        if (window.bgmPlayer && window.bgmPlayer.src) {
            window.bgmPlayer.playbackRate = scale;
        }
    }

    function adjustHumanity(val) {
        window.gameData.currentHumanity = parseFloat(val);
        document.getElementById('humanity-slider-val').innerText = val;
        
        const activeScene = phaserGame.scene.getScene('PlayScene');
        if (activeScene && phaserGame.scene.isActive('PlayScene')) {
            activeScene.player.updateHumanity(0); // FSM 강제 갱신 트리거
        }
    }

    function addPillCount(amount) {
        window.gameData.pillsCollected += amount;
        document.getElementById('pills-display').innerText = window.gameData.pillsCollected;
    }

    function toggleRescueStatus() {
        if (window.gameData.rescuedScientists >= 3) {
            window.gameData.rescuedScientists = 0;
        } else {
            window.gameData.rescuedScientists = 3;
        }
        window.gameData.isScientistRescued = (window.gameData.rescuedScientists >= 3);
        
        const btn = document.getElementById('btn-rescue');
        btn.innerText = `시민구출: ${window.gameData.rescuedScientists} / 3`;
        
        const card = document.getElementById('rescued-card');
        const status = document.getElementById('rescued-status');
        if (window.gameData.isScientistRescued) {
            card.style.display = 'flex';
            status.innerText = `${window.gameData.rescuedScientists} / 3`;
            status.style.color = 'var(--neon-cyan)';
        } else {
            card.style.display = 'flex';
            status.innerText = `${window.gameData.rescuedScientists} / 3`;
            status.style.color = '#fff';
        }
    }

    function addZombieCombo(amount) {
        window.gameData.totalEscortedCount += amount;
        window.gameData.maxZombieCombo = Math.max(window.gameData.maxZombieCombo, window.gameData.totalEscortedCount);
        
        document.getElementById('combo-display').innerText = window.gameData.totalEscortedCount;
        document.getElementById('escort-display').innerText = window.gameData.totalEscortedCount;
        
        const activeScene = phaserGame.scene.getScene('PlayScene');
        if (activeScene && phaserGame.scene.isActive('PlayScene')) {
            activeScene.addZombiesToHorde(amount);
        }
    }

    function clearZombies() {
        const activeScene = phaserGame.scene.getScene('PlayScene');
        if (activeScene && phaserGame.scene.isActive('PlayScene')) {
            activeScene.zombieGroup.getChildren().forEach(zombie => {
                zombie.deactivate();
            });
        }
    }

    function toggleHitboxDebug() {
        window.gameData.showHitboxes = !window.gameData.showHitboxes;
        const btn = document.getElementById('btn-hitbox');
        btn.innerText = `히트박스 가시화: ${window.gameData.showHitboxes ? 'ON' : 'OFF'}`;
        
        const playScene = phaserGame.scene.getScene('PlayScene');
        if (playScene && phaserGame.scene.isActive('PlayScene')) {
            // Phaser 피직스 디버그 그리기 런타임 제어
            playScene.physics.world.drawDebug = window.gameData.showHitboxes;
            if (!window.gameData.showHitboxes) {
                playScene.physics.world.debugGraphic.clear();
            }
        }
    }

    // 자막 표출 헬퍼 함수
    function showSubtitle(text, duration = 3000) {
        const overlay = document.getElementById('subtitle-overlay');
        overlay.innerText = text;
        overlay.style.display = 'block';
        
        // 기존 타이머 제거 방지 위해 씬 타임아웃 대신 간단한 타이머
        if (window.subtitleTimer) clearTimeout(window.subtitleTimer);
        window.subtitleTimer = setTimeout(() => {
            overlay.style.display = 'none';
        }, duration / window.gameData.timeScale);

    class BootScene extends Phaser.Scene {

        preload() {

                if (file.key === 'opening_vid') window.gameData.useOpeningFallback = true;
                if (file.key === 'ending_norm_vid') window.gameData.useEndingNormalFallback = true;
                if (file.key === 'ending_true_vid') window.gameData.useEndingTrueFallback = true;

            this.load.on('filecomplete-video-opening_vid', () => { window.gameData.useOpeningFallback = false; });
            this.load.on('filecomplete-video-ending_norm_vid', () => { window.gameData.useEndingNormalFallback = false; });
            this.load.on('filecomplete-video-ending_true_vid', () => { window.gameData.useEndingTrueFallback = false; });

        createPixelTexture(key, width, height, drawCallback) {
            let canvas = this.textures.createCanvas(key, width, height);
            let ctx = canvas.context;
            drawCallback(ctx);
            canvas.refresh();
        }
    }

    // [INTRO SCENE]: 오프닝 영상 플레이 (또는 텍스트 자막 폴백 시네마틱)
    class IntroScene extends Phaser.Scene {
        constructor() {
            super('IntroScene');
            this.introSkipped = false;
        }

        create() {
            this.introSkipped = false;
            this.cameras.main.setBackgroundColor('#000000');
            this.cameras.main.fadeIn(500, 0, 0, 0);

            // 스킵 안내용 텍스트
            const skipGuide = this.add.text(780, 20, '화면을 클릭하면 인트로 스킵', {
                fontFamily: 'Noto Sans KR',
                fontSize: '11px',
                fill: '#8892b0'
            }).setOrigin(1, 0).setDepth(20);

            this.input.on('pointerdown', () => {
                this.skipIntro();
            });

            // 비디오 파일이 없고 로드에 실패했거나 예외가 난 경우 -> 폴백 사각형 인트로 씬 가동
            if (window.gameData.useOpeningFallback) {
                this.runIntroFallback();
            } else {
                // 비디오 재생 시도
                try {
                    this.video = this.add.video(400, 200, 'opening_vid');
                    this.video.setDisplaySize(800, 400);
                    this.video.play();
                    
                    this.video.on('complete', () => {
                        this.endIntro();
                    });

                    this.video.on('error', (err) => {
                        console.error("비디오 플레이 에러: 폴백 강제 전환", err);
                        this.video.destroy();
                        this.runIntroFallback();
                    });
                } catch(e) {
                    this.runIntroFallback();
                }
            }
        }

        runIntroFallback() {
            showSubtitle("인류가 미처 대응하기도 전에 바이러스가 대지를 삼켰다.", 3500);

            // 좌측 방향으로 달리는 하늘색 사각형(플레이어) 연출 생성
            const tempPlayer = this.add.rectangle(600, 220, 32, 32, 0x00d2fc);
            const ground = this.add.rectangle(400, 250, 800, 10, 0x5d4037);

            // 쫓아오는 좀비들
            const followZombies = [];
            for (let i = 0; i < 5; i++) {
                let z = this.add.rectangle(750 + i * 40, 220, 32, 32, 0x2ebd59);
                followZombies.push(z);
            }

            // 가로 스크롤 및 자막 시간 연동 트리거들
            this.tweens.add({
                targets: [tempPlayer, ...followZombies],
                x: '-=500',
                duration: 6000 / window.gameData.timeScale,
                ease: 'Linear',
                onUpdate: () => {
                    // 무리 걷는 느낌의 위아래 상하 흔들림 루틴
                    tempPlayer.y = 220 + Math.sin(this.time.now * 0.01) * 3;
                    followZombies.forEach((z, idx) => {
                        z.y = 220 + Math.sin(this.time.now * 0.01 + idx) * 3;
                    });
                }
            });

            this.time.delayedCall(4000 / window.gameData.timeScale, () => {
                if (this.introSkipped) return;
                showSubtitle("살아남기 위해, 그녀는 뒤쪽의 감염 군단을 이끌고 달렸다.", 4000);
            });

            this.time.delayedCall(8000 / window.gameData.timeScale, () => {
                this.endIntro();
            });
        }

        skipIntro() {
            if (this.introSkipped) return;
            this.introSkipped = true;
            if (this.video) {
                this.video.stop();
                this.video.destroy();
            }
            this.endIntro();
        }

        endIntro() {
            this.cameras.main.fadeOut(800, 0, 0, 0);
            this.cameras.main.once(Phaser.Cameras.Scene2D.Events.FADE_OUT_COMPLETE, () => {
                document.getElementById('subtitle-overlay').style.display = 'none';
                this.scene.start('PlayScene');
            });
        }
    }
